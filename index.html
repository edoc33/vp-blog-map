<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VP Blog Content Cluster Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — 10x Cluster Map
   ═══════════════════════════════════════════ */

:root {
    /* Backgrounds — deep space palette */
    --bg-void: #07080C;
    --bg-primary: #0B0D14;
    --bg-surface: rgba(14, 17, 26, 0.82);
    --bg-elevated: rgba(20, 24, 38, 0.72);
    --bg-hover: rgba(30, 36, 56, 0.6);
    --bg-glass: rgba(16, 20, 32, 0.55);

    /* Borders */
    --border-subtle: rgba(255, 255, 255, 0.04);
    --border-default: rgba(255, 255, 255, 0.07);
    --border-active: rgba(99, 140, 255, 0.4);
    --border-glow: rgba(99, 140, 255, 0.15);

    /* Text */
    --text-primary: #F0F2F8;
    --text-secondary: #8B93AD;
    --text-tertiary: #505872;
    --text-ghost: #353B50;

    /* Accent — electric indigo */
    --accent: #638CFF;
    --accent-bright: #8AADFF;
    --accent-soft: rgba(99, 140, 255, 0.10);
    --accent-glow: rgba(99, 140, 255, 0.25);

    /* Status colors — luminous */
    --green: #3EE0A8;
    --green-soft: rgba(62, 224, 168, 0.10);
    --green-glow: rgba(62, 224, 168, 0.25);
    --yellow: #F5C542;
    --yellow-soft: rgba(245, 197, 66, 0.10);
    --yellow-glow: rgba(245, 197, 66, 0.25);
    --orange: #F59E42;
    --orange-soft: rgba(245, 158, 66, 0.10);
    --red: #F56565;
    --red-soft: rgba(245, 101, 101, 0.10);
    --red-glow: rgba(245, 101, 101, 0.25);

    /* Radii */
    --r-xs: 6px;
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
    --r-xl: 20px;
    --r-pill: 100px;

    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
    --shadow-glow: 0 0 30px rgba(99,140,255,0.08);

    /* Timing */
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    --dur-fast: 150ms;
    --dur-med: 300ms;
    --dur-slow: 500ms;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    display: flex;
    font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* Scrollbar — barely there */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

/* ─── LEFT SIDEBAR ─── */
#sidebar-left {
    width: 280px;
    min-width: 280px;
    background: var(--bg-surface);
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border-right: 1px solid var(--border-subtle);
    padding: 24px 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 10;
    position: relative;
}

/* Sidebar edge glow */
#sidebar-left::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--accent-glow), transparent);
    opacity: 0.3;
}

.sidebar-header {
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-subtle);
}

.sidebar-header h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.4px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.sidebar-header h1::before {
    content: '';
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow), 0 0 20px rgba(99,140,255,0.1);
    animation: pulse-dot 3s ease-in-out infinite;
}

@keyframes pulse-dot {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.2); }
}

.sidebar-header .subtitle {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 4px;
    font-weight: 400;
    padding-left: 15px;
}

/* ─── STAT GRID ─── */
.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
}

.stat-card {
    background: var(--bg-elevated);
    backdrop-filter: blur(20px);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    border: 1px solid var(--border-subtle);
    transition: all var(--dur-med) var(--ease-out);
    position: relative;
    overflow: hidden;
}

.stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
}

.stat-card:hover {
    border-color: var(--border-default);
    background: var(--bg-hover);
    transform: translateY(-1px);
}

.stat-card .stat-value {
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
    line-height: 1;
}

.stat-card .stat-label {
    font-size: 9px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 4px;
    font-weight: 600;
}

.stat-card.wide {
    grid-column: span 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.stat-card.wide .stat-value { font-size: 15px; }

/* ─── SECTIONS ─── */
.section {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.section-title {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 1.2px;
}

/* ─── SEARCH ─── */
.search-wrap {
    position: relative;
}

.search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-ghost);
    transition: color var(--dur-fast);
    pointer-events: none;
}

.search-input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-sm);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 500;
    outline: none;
    transition: all var(--dur-med) var(--ease-out);
    font-family: inherit;
}

.search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-glow);
    background: rgba(20, 24, 38, 0.9);
}

.search-input:focus ~ svg { color: var(--accent); }
.search-input::placeholder { color: var(--text-ghost); font-weight: 400; }

/* ─── PILLS ─── */
.pill-group { display: flex; gap: 5px; flex-wrap: wrap; }

.pill {
    padding: 5px 12px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border-subtle);
    background: transparent;
    color: var(--text-tertiary);
    transition: all var(--dur-med) var(--ease-out);
    user-select: none;
    position: relative;
    overflow: hidden;
}

.pill::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, currentColor, transparent);
    opacity: 0;
    transition: opacity var(--dur-med);
}

.pill:hover {
    border-color: var(--border-default);
    color: var(--text-secondary);
    transform: translateY(-1px);
}

.pill.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent-bright);
    box-shadow: 0 0 16px var(--accent-soft);
}

.pill.healthy.active { background: var(--green-soft); border-color: var(--green); color: var(--green); box-shadow: 0 0 16px var(--green-soft); }
.pill.declining.active { background: var(--yellow-soft); border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 16px var(--yellow-soft); }
.pill.atrisk.active { background: var(--orange-soft); border-color: var(--orange); color: var(--orange); box-shadow: 0 0 16px var(--orange-soft); }
.pill.critical.active { background: var(--red-soft); border-color: var(--red); color: var(--red); box-shadow: 0 0 16px var(--red-soft); }

/* ─── TOGGLES ─── */
.toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
}

.toggle-row label {
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
    font-weight: 500;
}

.toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
}

.toggle input {
    opacity: 0;
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    z-index: 2;
    cursor: pointer;
    margin: 0;
}

.toggle .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    transition: all var(--dur-med) var(--ease-out);
    border: 1px solid var(--border-subtle);
}

.toggle .slider::before {
    position: absolute;
    content: "";
    height: 14px;
    width: 14px;
    left: 2px;
    bottom: 2px;
    background: var(--text-tertiary);
    border-radius: 50%;
    transition: all var(--dur-med) var(--ease-spring);
}

.toggle input:checked + .slider {
    background: var(--accent-soft);
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--accent-soft);
}

.toggle input:checked + .slider::before {
    transform: translateX(16px);
    background: var(--accent-bright);
    box-shadow: 0 0 8px var(--accent-glow);
}

/* ─── CLUSTER CHIPS ─── */
.cluster-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: 260px;
    overflow-y: auto;
}

.cluster-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: var(--r-xs);
    font-size: 11px;
    cursor: pointer;
    transition: all var(--dur-med) var(--ease-out);
    user-select: none;
    background: transparent;
}

.cluster-chip:hover { background: var(--bg-hover); }

.cluster-chip.inactive { opacity: 0.2; }

.cluster-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all var(--dur-med) var(--ease-out);
    box-shadow: 0 0 6px currentColor;
}

.cluster-chip:hover .dot {
    transform: scale(1.3);
    box-shadow: 0 0 10px currentColor;
}

.cluster-chip .name {
    flex: 1;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
}

.cluster-chip .count {
    color: var(--text-ghost);
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
}

/* ─── CANVAS ─── */
#canvas-container {
    flex: 1;
    position: relative;
    background: var(--bg-void);
    overflow: hidden;
}

/* Ambient background grain */
#canvas-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
    opacity: 0.5;
    pointer-events: none;
    z-index: 1;
}

#canvas-container svg { width: 100%; height: 100%; position: relative; z-index: 2; }

/* ─── TOOLTIP ─── */
#tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(14, 17, 28, 0.92);
    backdrop-filter: blur(24px) saturate(1.5);
    -webkit-backdrop-filter: blur(24px) saturate(1.5);
    border: 1px solid var(--border-default);
    border-radius: var(--r-lg);
    padding: 18px;
    font-size: 12px;
    max-width: 400px;
    min-width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 1px rgba(255,255,255,0.05), 0 0 40px rgba(99,140,255,0.04);
    z-index: 100;
    opacity: 0;
    transform: translateY(4px) scale(0.98);
    transition: opacity var(--dur-fast) var(--ease-out), transform var(--dur-med) var(--ease-spring);
}

#tooltip.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* Tooltip top edge highlight */
#tooltip::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    border-radius: 1px;
}

.tt-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 3px;
    line-height: 1.4;
    letter-spacing: -0.2px;
}

.tt-url {
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 12px;
    word-break: break-all;
    opacity: 0.7;
    font-weight: 500;
}

.tt-section {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-ghost);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 12px 0 6px;
    padding-top: 10px;
    border-top: 1px solid var(--border-subtle);
}

.tt-section:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }

.tt-row {
    display: flex;
    justify-content: space-between;
    padding: 2.5px 0;
    align-items: baseline;
}

.tt-label { color: var(--text-tertiary); font-size: 11px; font-weight: 500; }

.tt-val {
    color: var(--text-primary);
    font-weight: 600;
    font-size: 11px;
    text-align: right;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
}

.tt-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
}

.tt-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
}

.tt-badge.Healthy { background: var(--green-soft); color: var(--green); }
.tt-badge.Declining { background: var(--yellow-soft); color: var(--yellow); }
.tt-badge.At-Risk { background: var(--orange-soft); color: var(--orange); }
.tt-badge.Critical { background: var(--red-soft); color: var(--red); }
.tt-badge.Unknown { background: var(--bg-hover); color: var(--text-tertiary); }

.tt-alert {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    margin-top: 8px;
    border-radius: var(--r-sm);
    font-size: 11px;
    font-weight: 600;
}

.tt-alert.orphan { background: var(--yellow-soft); color: var(--yellow); }
.tt-alert.cannibal { background: var(--red-soft); color: var(--red); }

/* ─── RIGHT SIDEBAR ─── */
#sidebar-right {
    width: 300px;
    min-width: 300px;
    background: var(--bg-surface);
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border-left: 1px solid var(--border-subtle);
    padding: 24px 18px;
    overflow-y: auto;
    z-index: 10;
    position: relative;
}

#sidebar-right::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--accent-glow), transparent);
    opacity: 0.3;
}

#sidebar-right .section-title { margin-bottom: 12px; }

.cluster-row {
    padding: 12px;
    border-radius: var(--r-md);
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    transition: all var(--dur-med) var(--ease-out);
    position: relative;
}

.cluster-row:hover {
    background: var(--bg-hover);
    transform: translateX(-2px);
}

.cluster-row.active {
    background: var(--bg-hover);
    border-color: var(--border-active);
    box-shadow: 0 0 20px var(--accent-soft);
}

.cr-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.cr-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.2px;
}

.cr-count {
    font-size: 10px;
    color: var(--text-ghost);
    background: rgba(255,255,255,0.04);
    padding: 2px 8px;
    border-radius: var(--r-pill);
    font-variant-numeric: tabular-nums;
    font-weight: 700;
}

.cr-metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
}

.cr-metric {
    font-size: 10px;
    color: var(--text-ghost);
    font-weight: 500;
}

.cr-metric strong {
    color: var(--text-secondary);
    font-weight: 700;
    display: block;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
}

/* ─── LEGEND ─── */
#legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(11, 13, 20, 0.85);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-md);
    padding: 14px 16px;
    font-size: 10px;
    z-index: 20;
    box-shadow: var(--shadow-lg);
}

.legend-section { margin-bottom: 10px; }
.legend-section:last-child { margin-bottom: 0; }

.legend-title {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-ghost);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 3px 0;
    color: var(--text-tertiary);
    font-weight: 500;
}

.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
}

.legend-line { width: 18px; height: 0; flex-shrink: 0; }

.size-legend { display: flex; align-items: flex-end; gap: 8px; }

.size-dot {
    border-radius: 50%;
    background: var(--accent-soft);
    border: 1px solid rgba(99,140,255,0.2);
}

/* ─── VISIBLE COUNT (floating pill) ─── */
#visible-count {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(11, 13, 20, 0.8);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-pill);
    padding: 6px 18px;
    font-size: 11px;
    color: var(--text-tertiary);
    z-index: 20;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    box-shadow: var(--shadow-md);
    transition: all var(--dur-med) var(--ease-out);
}

#visible-count strong { color: var(--text-primary); font-weight: 700; }

/* ─── ZOOM CONTROLS ─── */
#zoom-controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 20;
}

.zoom-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(11, 13, 20, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: all var(--dur-med) var(--ease-out);
    font-family: inherit;
}

.zoom-btn:first-child { border-radius: var(--r-sm) var(--r-sm) 0 0; }
.zoom-btn:last-child { border-radius: 0 0 var(--r-sm) var(--r-sm); }

.zoom-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
    border-color: var(--border-default);
}

.zoom-btn:active { transform: scale(0.92); }

/* ─── SVG FILTERS (defined in SVG defs) ─── */

/* ─── ANIMATIONS ─── */
@keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes glow-pulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
}

.animate-in {
    animation: fade-in var(--dur-slow) var(--ease-out) both;
}

/* Staggered children */
.stagger > *:nth-child(1) { animation-delay: 0ms; }
.stagger > *:nth-child(2) { animation-delay: 30ms; }
.stagger > *:nth-child(3) { animation-delay: 60ms; }
.stagger > *:nth-child(4) { animation-delay: 90ms; }
.stagger > *:nth-child(5) { animation-delay: 120ms; }
.stagger > *:nth-child(6) { animation-delay: 150ms; }
.stagger > *:nth-child(7) { animation-delay: 180ms; }
.stagger > *:nth-child(8) { animation-delay: 210ms; }

/* ─── MINIMAP ─── */
#minimap {
    position: absolute;
    bottom: 20px;
    right: 68px;
    width: 120px;
    height: 80px;
    background: rgba(11, 13, 20, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-sm);
    z-index: 20;
    overflow: hidden;
    box-shadow: var(--shadow-md);
}

#minimap canvas {
    width: 100%;
    height: 100%;
}

#minimap .viewport-rect {
    position: absolute;
    border: 1px solid var(--accent);
    background: var(--accent-soft);
    border-radius: 2px;
    pointer-events: none;
}
</style>
</head>

        const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic

}

function drawGrid(transform) {
    gridG.selectAll("*").remove();
    const scale = transform ? transform.k : 0.92;
    if (scale < 0.3) return; // hide grid when zoomed way out

    const spacing = 40;
    const opacity = Math.min(0.08, 0.03 + (scale - 0.5) * 0.04);
    const dotR = Math.max(0.4, Math.min(1.2, 0.5 + scale * 0.3));

    // Calculate visible range in data coordinates
    const tx = transform ? transform.x : 0;
    const ty = transform ? transform.y : 0;
    const x0 = (-tx / scale);
    const y0 = (-ty / scale);
    const x1 = (W - tx) / scale;
    const y1 = (H - ty) / scale;

    const startX = Math.floor(x0 / spacing) * spacing;
    const startY = Math.floor(y0 / spacing) * spacing;

    const dots = [];
    for (let x = startX; x < x1; x += spacing) {
        for (let y = startY; y < y1; y += spacing) {
            dots.push([x, y]);
        }
    }

    // Limit to 2000 dots for perf
    const sample = dots.length > 2000 ? dots.filter((_, i) => i % Math.ceil(dots.length / 2000) === 0) : dots;

    gridG.selectAll("circle")
        .data(sample)
        .enter()
        .append("circle")
        .attr("cx", d => d[0])
        .attr("cy", d => d[1])
        .attr("r", dotR)
        .attr("fill", `rgba(255,255,255,${opacity})`);
}

        // Hull outline — crisp, minimal
        const padded = hull.map(p => {
            const dx = p[0]-c[0], dy = p[1]-c[1], dist = Math.sqrt(dx*dx+dy*dy);
            const s = (dist+24)/dist;
            return [c[0]+dx*s, c[1]+dy*s];
        });
        const line = d3.line().curve(d3.curveCatmullRomClosed.alpha(0.5));
        hullG.append("path").attr("d", line(padded))
            .attr("fill", col).attr("fill-opacity", 0.04)
            .attr("stroke", col).attr("stroke-opacity", 0.15).attr("stroke-width", 1);

        // Cluster label
        const info = DATA.cluster_summary.find(x => x.id===cid);
        if (info) {
            hullLabelG.append("text")
                .attr("x", c[0]).attr("y", c[1] - Math.sqrt(pts.length)*9)
                .attr("text-anchor","middle")
                .attr("fill", col).attr("fill-opacity", 0.35)
                .attr("font-size","10px").attr("font-weight","700")
                .attr("letter-spacing","0.5px")
                .text(info.name.toUpperCase());
        }
    });
}

function drawEdges() {
    edgeG.selectAll("*").remove();
    if (!showLinks) return;

    DATA.edges.forEach(e => {
        const s = nodeMap[e.source], t = nodeMap[e.target];
        if (!s||!t||!visible(s)||!visible(t)) return;

        const [x1, y1] = pos(s);
        const [x2, y2] = pos(t);

        // Curved bezier for visual interest
        const mx = (x1 + x2) / 2;
        const my = (y1 + y2) / 2;
        const dx = x2 - x1;
        const dy = y2 - y1;
        const offset = Math.sqrt(dx*dx + dy*dy) * 0.1;
        const cx = mx - dy * 0.1;
        const cy = my + dx * 0.1;

        const colS = cColor[s.cluster_id] || "#3a3f55";
        const colT = cColor[t.cluster_id] || "#3a3f55";

        // Create gradient for cross-cluster links
        if (s.cluster_id !== t.cluster_id) {
            const gradId = `lg-${s.id}-${t.id}`.replace(/[^a-zA-Z0-9-]/g, '_');
            const grad = edgeG.append("linearGradient")
                .attr("id", gradId)
                .attr("x1", x1).attr("y1", y1).attr("x2", x2).attr("y2", y2)
                .attr("gradientUnits", "userSpaceOnUse");
            grad.append("stop").attr("offset", "0%").attr("stop-color", colS).attr("stop-opacity", 0.3);
            grad.append("stop").attr("offset", "100%").attr("stop-color", colT).attr("stop-opacity", 0.3);

            edgeG.append("path")
                .attr("d", `M${x1},${y1} Q${cx},${cy} ${x2},${y2}`)
                .attr("fill", "none")
                .attr("stroke", `url(#${gradId})`)
                .attr("stroke-width", 0.6)
                .attr("stroke-opacity", 0.4);
        } else {
            edgeG.append("path")
                .attr("d", `M${x1},${y1} Q${cx},${cy} ${x2},${y2}`)
                .attr("fill", "none")
                .attr("stroke", colS)
                .attr("stroke-width", 0.5)
                .attr("stroke-opacity", 0.2);
        }
    });
}

function drawCannibal() {
    cannG.selectAll("*").remove();
    if (!showCannibal) return;
    DATA.cannibalization_pairs.forEach(p => {
        const s = nodeMap[p.url_a], t = nodeMap[p.url_b];
        if (!s||!t) return;
        const [x1,y1] = pos(s);
        const [x2,y2] = pos(t);

        // Glow underlay
        cannG.append("line")
            .attr("x1",x1).attr("y1",y1).attr("x2",x2).attr("y2",y2)
            .attr("stroke","var(--red)").attr("stroke-width",4)
            .attr("stroke-opacity",0.1)
            .attr("filter","url(#cannibal-glow)");

        // Main line
        cannG.append("line")
            .attr("x1",x1).attr("y1",y1).attr("x2",x2).attr("y2",y2)
            .attr("stroke","var(--red)").attr("stroke-width",1.5)
            .attr("stroke-dasharray","6,4").attr("stroke-opacity",0.55)
            .attr("stroke-linecap","round");
    });
}

function drawNodes() {
    nodeG.selectAll("*").remove();
    labelG.selectAll("*").remove();
    let visCount = 0;

    DATA.nodes.forEach(n => {
        if (!visible(n)) return;
        visCount++;
        const [cx,cy] = pos(n), r = nodeR(n), col = cColor[n.cluster_id]||"#666";

        // Determine status styling
        let strokeCol = "rgba(255,255,255,0.06)", strokeW = 0.5, dash = "none";
        let glowOpacity = 0;
        let pulseClass = "";

        if (n.is_cannibalized && showCannibal) {
            strokeCol = "var(--red)"; strokeW = 2; glowOpacity = 0.2;
        } else if (n.is_orphan && showOrphans) {
            strokeCol = "var(--yellow)"; strokeW = 1.5; dash = "3,2"; glowOpacity = 0.15;
        }

        // Health-based inner glow ring
        const healthColors = { 'Healthy': null, 'Declining': 'var(--yellow)', 'At-Risk': 'var(--orange)', 'Critical': 'var(--red)' };
        const healthGlow = healthColors[n.health];

        // Outer glow (for important/problematic nodes)
        if (glowOpacity > 0 || r > 14) {
            nodeG.append("circle")
                .attr("cx",cx).attr("cy",cy)
                .attr("r", r + 4)
                .attr("fill", col)
                .attr("fill-opacity", glowOpacity > 0 ? glowOpacity : 0.06)
                .attr("filter", "url(#glow)")
                .style("pointer-events", "none");
        }

        // Health ring (subtle inner ring for declining/critical)
        if (healthGlow && r > 6) {
            nodeG.append("circle")
                .attr("cx",cx).attr("cy",cy)
                .attr("r", r + 1.5)
                .attr("fill", "none")
                .attr("stroke", healthGlow)
                .attr("stroke-width", 1)
                .attr("stroke-opacity", 0.4)
                .style("pointer-events", "none");
        }

        // Main node circle
        const circle = nodeG.append("circle")
            .attr("cx",cx).attr("cy",cy).attr("r", 0) // start at 0 for animation
            .attr("fill", col)
            .attr("fill-opacity", 0.78)
            .attr("stroke", strokeCol)
            .attr("stroke-width", strokeW)
            .attr("stroke-dasharray", dash)
            .attr("cursor","pointer")
            .style("transition", "fill-opacity 0.2s, r 0.3s cubic-bezier(0.34,1.56,0.64,1)");

        // Animate radius in
        circle.transition()
            .duration(400)
            .delay(Math.random() * 200)
            .ease(d3.easeBackOut.overshoot(1.5))
            .attr("r", r);

        // Interaction
        circle
            .on("mouseenter", function(ev) {
                d3.select(this)
                    .attr("fill-opacity", 1)
                    .attr("stroke", col)
                    .attr("stroke-width", 2)
                    .attr("stroke-opacity", 0.5);
                // Scale up gently
                d3.select(this).transition().duration(150).attr("r", r * 1.15);
                showTT(ev, n);
            })
            .on("mouseleave", function() {
                d3.select(this)
                    .attr("fill-opacity", 0.78)
                    .attr("stroke", strokeCol)
                    .attr("stroke-width", strokeW);
                d3.select(this).transition().duration(200).attr("r", r);
                if (!pinnedNode) hideTT();
            })
            .on("click", function(ev) {
                ev.stopPropagation();
                if (pinnedNode === n.id) { pinnedNode = null; hideTT(); }
                else { pinnedNode = n.id; showTT(ev, n); }
            });

        // Labels
        if (showLabels && r > 6) {
            labelG.append("text").attr("x",cx).attr("y",cy + r + 12)
                .attr("text-anchor","middle")
                .attr("fill","var(--text-ghost)")
                .attr("font-size","8px").attr("font-weight","600")
                .attr("letter-spacing","0.2px")
                .attr("opacity", 0)
                .text(n.title.length > 30 ? n.title.substring(0,28)+"..." : n.title)
                .transition().duration(300).delay(Math.random() * 100).attr("opacity", 0.7);
        }
    });

    document.getElementById("visible-count").innerHTML =
        `Showing <strong>${visCount}</strong> of ${DATA.nodes.length} posts`;
}

// --- Tooltip ---
const ttEl = document.getElementById("tooltip");

function showTT(ev, d) {
    const h = d.health || "Unknown";
    const hCss = h.replace(' ','-');
    ttEl.innerHTML = `
        <div class="tt-title">${d.title}</div>
        <div class="tt-url">${d.url}</div>
        <div class="tt-section">Cluster</div>
        <div class="tt-row"><span class="tt-label">Cluster</span><span class="tt-val">${DATA.cluster_summary.find(c=>c.id===d.cluster_id)?.name||'—'}</span></div>
        <div class="tt-row"><span class="tt-label">Top Keyword</span><span class="tt-val">${d.top_keyword||'—'}</span></div>
        <div class="tt-row"><span class="tt-label">Status</span><span class="tt-val"><span class="tt-badge ${hCss}">${h}</span></span></div>
        <div class="tt-section">Performance &middot; 90 days</div>
        <div class="tt-row"><span class="tt-label">GSC Clicks</span><span class="tt-val">${(d.gsc_clicks||0).toLocaleString()}</span></div>
        <div class="tt-row"><span class="tt-label">Impressions</span><span class="tt-val">${(d.gsc_impressions||0).toLocaleString()}</span></div>
        <div class="tt-row"><span class="tt-label">CTR</span><span class="tt-val">${d.gsc_ctr ? (d.gsc_ctr*100).toFixed(1)+'%' : '—'}</span></div>
        <div class="tt-row"><span class="tt-label">Avg Position</span><span class="tt-val">${d.gsc_position ? d.gsc_position.toFixed(1) : '—'}</span></div>
        <div class="tt-section">Conversions &middot; 90 days</div>
        <div class="tt-row"><span class="tt-label">Signups</span><span class="tt-val">${(d.signups||0).toLocaleString()}</span></div>
        <div class="tt-row"><span class="tt-label">Paid Conv</span><span class="tt-val">${(d.paid_conversions||0).toLocaleString()}</span></div>
        <div class="tt-section">Content</div>
        <div class="tt-row"><span class="tt-label">Word Count</span><span class="tt-val">${(d.word_count||0).toLocaleString()}</span></div>
        <div class="tt-row"><span class="tt-label">Internal Links</span><span class="tt-val">${d.internal_links_in||0} in / ${d.internal_links_out||0} out</span></div>
        <div class="tt-row"><span class="tt-label">Search Vol</span><span class="tt-val">${(d.total_sv||0).toLocaleString()}</span></div>
        ${d.is_orphan ? '<div class="tt-alert orphan"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Orphan — no internal links pointing here</div>' : ''}
        ${d.is_cannibalized ? '<div class="tt-alert cannibal"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Keyword cannibalization detected</div>' : ''}
    `;

    // Position tooltip
    const rect = container.getBoundingClientRect();
    let x = ev.clientX - rect.left + 16;
    let y = ev.clientY - rect.top - 10;
    if (x + 400 > rect.width) x = ev.clientX - rect.left - 420;
    if (y + ttEl.offsetHeight > rect.height) y = rect.height - ttEl.offsetHeight - 10;
    if (y < 10) y = 10;
    ttEl.style.left = x + "px";
    ttEl.style.top = y + "px";
    ttEl.style.display = "block";

    // Trigger animation
    requestAnimationFrame(() => { ttEl.classList.add("visible"); });
}

function hideTT() {
    ttEl.classList.remove("visible");
    setTimeout(() => {
        if (!ttEl.classList.contains("visible")) ttEl.style.display = "none";
    }, 200);
}

// Dismiss pinned on canvas click
svg.on("click", () => { pinnedNode = null; hideTT(); });

// --- Event handlers ---
document.getElementById("search").addEventListener("input", e => { searchTerm = e.target.value; render(); });

document.querySelectorAll("[data-health]").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll("[data-health]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        healthFilter = btn.dataset.health;
        render();
    });
});

document.querySelectorAll("[data-size]").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll("[data-size]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        sizeMode = btn.dataset.size;
        render();
    });
});

document.getElementById("t-links").addEventListener("change", e => { showLinks = e.target.checked; render(); });
document.getElementById("t-orphans").addEventListener("change", e => { showOrphans = e.target.checked; render(); });
document.getElementById("t-cannibal").addEventListener("change", e => { showCannibal = e.target.checked; render(); });
document.getElementById("t-labels").addEventListener("change", e => { showLabels = e.target.checked; render(); });

function zoomToCluster(cid) {
    const members = DATA.nodes.filter(n => n.cluster_id === cid);
    if (!members.length) return;
    activeClusters.add(cid);
    const chip = chipsEl.querySelector(`[data-cid="${cid}"]`);
    if (chip) chip.classList.remove("inactive");
    document.querySelectorAll(".cluster-row").forEach(r => r.classList.remove("active"));
    const row = detailEl.querySelector(`[data-cid="${cid}"]`);
    if (row) row.classList.add("active");
    const xs = members.map(m => xS(m.x)), ys = members.map(m => yS(m.y));
    const x0 = d3.min(xs)-60, x1 = d3.max(xs)+60, y0 = d3.min(ys)-60, y1 = d3.max(ys)+60;
    const scale = Math.min(W/(x1-x0), H/(y1-y0)) * 0.8;
    const cx = (x0+x1)/2, cy = (y0+y1)/2;
    svg.transition().duration(800).ease(d3.easeCubicInOut).call(zoomBehavior.transform,
        d3.zoomIdentity.translate(W/2,H/2).scale(scale).translate(-cx,-cy));
    render();
}

// --- Minimap ---
const minimapCanvas = document.querySelector("#minimap canvas");
const minimapCtx = minimapCanvas.getContext("2d");
const minimapRect = document.querySelector("#minimap .viewport-rect");
const mmW = 120, mmH = 80;
minimapCanvas.width = mmW * 2; // retina
minimapCanvas.height = mmH * 2;
minimapCtx.scale(2, 2);

function drawMinimap() {
    minimapCtx.clearRect(0, 0, mmW, mmH);
    const scaleX = mmW / W;
    const scaleY = mmH / H;

    DATA.nodes.forEach(n => {
        if (!visible(n)) return;
        const [x, y] = pos(n);
        const col = cColor[n.cluster_id] || "#666";
        minimapCtx.fillStyle = col;
        minimapCtx.globalAlpha = 0.6;
        minimapCtx.beginPath();
        minimapCtx.arc(x * scaleX, y * scaleY, Math.max(1, nodeR(n) * scaleX * 0.5), 0, Math.PI * 2);
        minimapCtx.fill();
    });
    minimapCtx.globalAlpha = 1;
}

function updateMinimap(transform) {
    if (!transform) return;
    const scaleX = mmW / W;
    const scaleY = mmH / H;
    const vx = -transform.x / transform.k * scaleX;
    const vy = -transform.y / transform.k * scaleY;
    const vw = W / transform.k * scaleX;
    const vh = H / transform.k * scaleY;
    minimapRect.style.left = Math.max(0, vx) + "px";
    minimapRect.style.top = Math.max(0, vy) + "px";
    minimapRect.style.width = Math.min(mmW, vw) + "px";
    minimapRect.style.height = Math.min(mmH, vh) + "px";
}

// --- Render orchestrator ---
function render() {
    drawHulls();
    drawEdges();
    drawCannibal();
    drawNodes();
    drawMinimap();
}

// --- Initial render with entrance animation ---
render();
const initialTransform = d3.zoomIdentity.translate(0, 0).scale(0.92);
svg.call(zoomBehavior.transform, initialTransform);
drawGrid(initialTransform);
updateMinimap(initialTransform);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'l' || e.key === 'L') {
        showLinks = !showLinks;
        document.getElementById("t-links").checked = showLinks;
        render();
    }
    if (e.key === 'o' || e.key === 'O') {
        showOrphans = !showOrphans;
        document.getElementById("t-orphans").checked = showOrphans;
        render();
    }
    if (e.key === 'c' || e.key === 'C') {
        showCannibal = !showCannibal;
        document.getElementById("t-cannibal").checked = showCannibal;
        render();
    }
    if (e.key === 'n' || e.key === 'N') {
        showLabels = !showLabels;
        document.getElementById("t-labels").checked = showLabels;
        render();
    }
    if (e.key === 'Escape') {
        pinnedNode = null;
        hideTT();
    }
});

</script>
